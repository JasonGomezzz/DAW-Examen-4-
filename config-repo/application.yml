eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  mensaje-error-servicio: "No fue posible consultar el servicio. Intente nuevamente."
  mensaje-bienvenida: "Bienvenido al Sistema de Reclutamiento ATS"
